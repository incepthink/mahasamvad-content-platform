packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 10 blocks dependency postinstall scripts unless allowlisted. ffmpeg-static's
# install script IS the ffmpeg binary download (video stitching); without it the
# package resolves to null and assembleSilentVideo fails (or set FFMPEG_PATH).
onlyBuiltDependencies:
  - ffmpeg-static

